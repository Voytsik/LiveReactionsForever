name: Ping Bot Daily

on:
  schedule:
    # Хвилина 55, години з 5 до 19 включно, кожен день
    - cron: '55 5-19 * * *'
  workflow_dispatch:  # дозволяє запуск вручну з інтерфейсу GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send HTTP request to bot's website
        run: |
          STATUS=$(curl -I -s -o /dev/null -w "%{http_code}" https://livereactionsforever.onrender.com/)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "⚠️ Website returned non-200 status!" && exit 1
          fi
